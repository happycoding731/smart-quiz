    // 修复缺失前缀的 Base64 图片
    function fixBase64Images(htmlString) {
        if (typeof htmlString !== 'string') return htmlString;
        return htmlString.replace(/src="(?!data:image)([^"]+)"/g, (match, p1) => {
            if (/^[A-Za-z0-9+/=]+$/.test(p1) && (p1.startsWith('iVBOR') || p1.startsWith('/9j/') || p1.length > 100)) {
                return `src="data:image/png;base64,${p1}"`;
            }
            return match;
        });
    }

    function extractAnswerFromQuestion(q) {
        const text = q.question;
        const type = q.type;
        if (type === 'judge') {
            const match = text.match(/[（(]\s*([√×])\s*[）)]/);
            if (match) return match[1] === '√' ? '正确' : '错误';
            if (/正确/.test(text)) return '正确';
            if (/错误/.test(text)) return '错误';
            return '';
        } else if (type === 'single') {
            const match = text.match(/[（(]\s*([A-D])\s*[）)]/i);
            if (match) {
                const letter = match[1].toUpperCase();
                if (q.options && q.options.length) {
                    const idx = letter.charCodeAt(0) - 65;
                    if (idx >= 0 && idx < q.options.length) return q.options[idx];
                }
                return letter;
            }
            return '';
        }
        return '';
    }

    function getCleanQuestionText(raw) {
        let cleaned = raw.replace(/[（(]\s*[√×A-D]\s*[）)]/gi, '').trim();
        cleaned = cleaned.replace(/^(\d+[、.])/, '$1 ');
        cleaned = fixBase64Images(cleaned);
        return cleaned;
    }

    function isAnswerMatch(userChoice, correctAnswer) {
        if (!userChoice || !correctAnswer) return false;
        if (userChoice === correctAnswer) return true;
        if (/^[A-D]$/i.test(correctAnswer)) {
            const letter = correctAnswer.toUpperCase();
            if (userChoice.toUpperCase().startsWith(letter + '.') || userChoice.toUpperCase().startsWith(letter + '．')) {
                return true;
            }
        }
        if (/^[A-D]$/i.test(userChoice) && correctAnswer.toUpperCase().startsWith(userChoice.toUpperCase() + '.')) {
            return true;
        }
        return userChoice.trim().toLowerCase() === correctAnswer.trim().toLowerCase();
    }

    function saveToLocal() {
        localStorage.setItem('quizBank', JSON.stringify(questions));
    }

    function loadFromLocal() {
        const stored = localStorage.getItem('quizBank');
        if (stored) {
            try { questions = JSON.parse(stored); } catch(e) { console.warn(e); }
        }
        if (!questions || !questions.length) questions = [];
        questions = questions.map(q => {
            if (q.type === 'draw') {
                q.question = fixBase64Images(q.question);
                if (q.answer) q.answer = fixBase64Images(q.answer);
            }
            return q;
        });
        renderList();
        updateCount();
        saveToLocal();
        clearQuizDisplay();
    }

    function getFilteredQuestions() {
        const filter = typeFilter.value;
        if (filter === 'all') return questions;
        return questions.filter(q => q.type === filter);
    }

    function renderList() {
        const filtered = getFilteredQuestions();
        if (!filtered.length) {
            questionListDiv.innerHTML = '<div style="text-align:center; padding:30px;">📭 当前题型无题目，请导入 JSON 或切换题型</div>';
            return;
        }
        let html = '';
        filtered.forEach((q, idx) => {
            let typeLabel = q.type === 'judge' ? '✅判断' : (q.type === 'single' ? '🔘单选' : '🎨画图');
            let clean = getCleanQuestionText(q.question);
            let short = clean.replace(/<[^>]*>/g, '').substring(0, 60);
            html += `<div class="question-item" data-original-index="${questions.indexOf(q)}">
                        <div><strong>${idx+1}. ${short}</strong> <span class="badge">${typeLabel}</span></div>
                     </div>`;
        });
        questionListDiv.innerHTML = html;
        document.querySelectorAll('.question-item').forEach(el => {
            el.addEventListener('click', () => {
                let origIdx = parseInt(el.dataset.originalIndex);
                if (!isNaN(origIdx)) displayQuestion(questions[origIdx]);
            });
        });
    }

    function displayQuestion(q) {
        currentQuestion = JSON.parse(JSON.stringify(q));
        let displayText = getCleanQuestionText(currentQuestion.question);
        if (currentQuestion.type === 'draw' && currentQuestion.question.includes('<img')) {
            displayText = fixBase64Images(currentQuestion.question);
        }
        quizQuestionDiv.innerHTML = displayText;
        renderInteractive(currentQuestion);
        feedbackZone.innerHTML = '';
    }

    function renderInteractive(q) {
        interactiveZone.innerHTML = '';
        if (q.type === 'judge') {
            interactiveZone.innerHTML = `<button class="btn" id="judgeTrue">✔️ 正确</button> <button class="btn" id="judgeFalse">❌ 错误</button>`;
            document.getElementById('judgeTrue').onclick = () => { interactiveZone.__userAns = '正确'; feedbackZone.innerHTML = '<span>✅ 已选择：正确</span>'; };
            document.getElementById('judgeFalse').onclick = () => { interactiveZone.__userAns = '错误'; feedbackZone.innerHTML = '<span>❌ 已选择：错误</span>'; };
        } else if (q.type === 'single') {
            let opts = q.options || [];
            if (!opts.length) {
                interactiveZone.innerHTML = '<div>⚠️ 该题未提供选项列表，请根据题目内容选择。</div>';
                return;
            }
            let radios = '';
            opts.forEach((opt, i) => {
                radios += `<div class="option-row"><label><input type="radio" name="singleOpt" value="${opt.replace(/"/g, '&quot;')}"> ${opt}</label></div>`;
            });
            interactiveZone.innerHTML = radios;
        } else if (q.type === 'draw') {
            interactiveZone.innerHTML = '<div>🎨 画图题答案请点击「显示答案」查看。</div>';
        }
    }

    function checkAnswer() {
        if (!currentQuestion) { alert("请先随机抽题"); return; }
        const q = currentQuestion;
        if (q.type === 'judge') {
            const user = interactiveZone.__userAns;
            if (!user) { feedbackZone.innerHTML = '<span style="color:red;">请先选择正确/错误</span>'; return; }
            const correct = extractAnswerFromQuestion(q);
            const ok = (user === correct);
            feedbackZone.innerHTML = ok ? '<span style="color:green;">✅ 回答正确！</span>' : `<span style="color:red;">❌ 错误！正确答案：${correct}</span>`;
        } else if (q.type === 'single') {
            const selected = document.querySelector('input[name="singleOpt"]:checked');
            if (!selected) { feedbackZone.innerHTML = '<span style="color:red;">请选择一个选项</span>'; return; }
            const userChoice = selected.value;
            const correctAnswer = extractAnswerFromQuestion(q);
            const ok = isAnswerMatch(userChoice, correctAnswer);
            feedbackZone.innerHTML = ok ? '<span style="color:green;">✅ 正确！</span>' : `<span style="color:red;">❌ 错误！正确答案：${correctAnswer}</span>`;
        } else {
            feedbackZone.innerHTML = '<span>📌 画图题请点击「显示答案」查看。</span>';
        }
    }

    function revealAnswer() {
        if (!currentQuestion) { alert("请先随机抽题"); return; }
        let ans = currentQuestion.answer;
        if (!ans && currentQuestion.type !== 'draw') {
            ans = extractAnswerFromQuestion(currentQuestion);
        }
        if (!ans) {
            feedbackZone.innerHTML = '<div><strong>参考答案：</strong><br>未提供答案。</div>';
            return;
        }
        ans = fixBase64Images(ans);
        if (currentQuestion.type === 'draw') {
            let html = '<div class="draw-answer"><strong>📐 画图题参考：</strong><br>';
            if (ans.startsWith('data:image') || ans.includes('<img')) {
                html += ans;
            } else {
                html += `<div style="white-space:pre-wrap;">${ans}</div>`;
            }
            html += '</div>';
            feedbackZone.innerHTML = html;
        } else {
            feedbackZone.innerHTML = `<div><strong>参考答案：</strong><br>${ans}</div>`;
        }
    }

    function randomPick() {
        const filtered = getFilteredQuestions();
        if (!filtered.length) {
            alert(`没有「${typeFilter.options[typeFilter.selectedIndex].text}」的题目，请换一个题型或导入 JSON。`);
            return;
        }
        const idx = Math.floor(Math.random() * filtered.length);
        displayQuestion(filtered[idx]);
    }

    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                let data = JSON.parse(e.target.result);
                if (Array.isArray(data)) {
                    data = data.map(q => {
                        if (q.type === 'draw') {
                            if (q.question) q.question = fixBase64Images(q.question);
                            if (q.answer) q.answer = fixBase64Images(q.answer);
                        }
                        return q;
                    });
                    questions = data;
                    renderList();
                    updateCount();
                    saveToLocal();
                    clearQuizDisplay();
                    alert(`✅ 导入成功！共 ${questions.length} 道题。`);
                } else throw new Error("格式错误");
            } catch(err) { alert("解析失败：" + err.message); }
        };
        reader.readAsText(file, "UTF-8");
    }

    function exportCurrent() {
        if (!questions.length) { alert("无题目可导出"); return; }
        const dataStr = JSON.stringify(questions, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `题库_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function clearAll() {
        if (confirm("清空所有题目？")) {
            questions = [];
            renderList();
            updateCount();
            saveToLocal();
            clearQuizDisplay();
        }
    }

    function clearQuizDisplay() {
        currentQuestion = null;
        quizQuestionDiv.innerHTML = '✨ 点击「随机抽题」开始练习';
        interactiveZone.innerHTML = '';
        feedbackZone.innerHTML = '';
    }

    function updateCount() {
        const filtered = getFilteredQuestions();
        totalCountSpan.innerText = `${filtered.length} / ${questions.length} 题`;
    }

    // DOM 元素
    const importFileInput = document.getElementById('importFile');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');
    const randomBtn = document.getElementById('randomBtn');
    const revealBtn = document.getElementById('revealBtn');
    const checkBtn = document.getElementById('checkBtn');
    const quizQuestionDiv = document.getElementById('quizQuestion');
    const interactiveZone = document.getElementById('interactiveZone');
    const feedbackZone = document.getElementById('feedbackZone');
    const questionListDiv = document.getElementById('questionList');
    const totalCountSpan = document.getElementById('totalCount');
    const typeFilter = document.getElementById('typeFilter');

    typeFilter.addEventListener('change', () => {
        renderList();
        updateCount();
        clearQuizDisplay();
    });

    importFileInput.addEventListener('change', e => {
        if (e.target.files.length) importJSON(e.target.files[0]);
        e.target.value = '';
    });
    exportBtn.addEventListener('click', exportCurrent);
    clearBtn.addEventListener('click', clearAll);
    randomBtn.addEventListener('click', randomPick);
    revealBtn.addEventListener('click', revealAnswer);
    checkBtn.addEventListener('click', checkAnswer);

    loadFromLocal();
</script>
</body>
</html>
